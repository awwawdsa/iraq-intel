<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الراصد — رصد العراق</title>
<link rel="icon" href="logo.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:    #06080c;
  --bg1:   #0a0f18;
  --bg2:   #0f1520;
  --bg3:   #141d2b;
  --bg4:   #1a2535;
  --line:  #1c2b3a;
  --line2: #243444;
  --t1:    #e2eaf4;
  --t2:    #7490a8;
  --t3:    #3a5068;
  --accent:#2563eb;
  --a2:    #1d4ed8;
  --a3:    rgba(37,99,235,.1);
  --a4:    rgba(37,99,235,.06);
  --green: #16a34a;
  --g2:    rgba(22,163,74,.1);
  --red:   #dc2626;
  --r2:    rgba(220,38,38,.1);
  --gold:  #ca8a04;
  --go2:   rgba(202,138,4,.1);
  --teal:  #0d9488;
  --te2:   rgba(13,148,136,.1);
  --orange:#ea580c;
  --or2:   rgba(234,88,12,.1);
  --purple:#7c3aed;
  --pu2:   rgba(124,58,237,.1);
  --font:  'IBM Plex Sans Arabic', sans-serif;
  --mono:  'JetBrains Mono', monospace;
  --r:     6px;
  --r2:    10px;
  --r3:    14px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--t1); min-height: 100vh; font-size: 14px; line-height: 1.6; }

/* ══ TOPBAR ══ */
.topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 200; height: 50px; background: rgba(6,8,12,.98); backdrop-filter: blur(20px); border-bottom: 1px solid var(--line); display: flex; align-items: center; padding: 0 18px; gap: 10px; }
.tb-logo-wrap { width: 28px; height: 28px; border-radius: 6px; overflow: hidden; flex-shrink: 0; }
.tb-logo-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
.tb-name { font-size: 14px; font-weight: 700; letter-spacing: .3px; }
.tb-live { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--green); font-family: var(--mono); }
.tb-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(1.3)} }
.tb-sep { flex: 1; }
.tb-time { font-family: var(--mono); font-size: 10px; color: var(--t3); }
.tb-btn { background: var(--bg3); border: 1px solid var(--line2); color: var(--t2); padding: 5px 11px; border-radius: var(--r); cursor: pointer; font-family: var(--font); font-size: 12px; font-weight: 500; text-decoration: none; transition: all .15s; display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; }
.tb-btn:hover { background: var(--bg4); color: var(--t1); }
.tb-btn.accent { background: var(--accent); border-color: var(--accent); color: #fff; }
.tb-btn.accent:hover { background: var(--a2); }
.tb-btn.danger { color: #f87171; border-color: rgba(220,38,38,.25); }
.tb-btn.danger:hover { background: rgba(220,38,38,.08); }
.tb-user { font-size: 10px; color: var(--t3); font-family: var(--mono); background: var(--bg3); padding: 4px 9px; border-radius: var(--r); border: 1px solid var(--line); }

/* ══ FILTERBAR ══ */
.filterbar { position: fixed; top: 50px; left: 0; right: 0; z-index: 190; background: rgba(6,8,12,.98); backdrop-filter: blur(12px); border-bottom: 1px solid var(--line); display: flex; align-items: center; padding: 7px 18px; gap: 7px; overflow-x: auto; }
.filterbar::-webkit-scrollbar { display: none; }
.s-wrap { position: relative; flex-shrink: 0; }
.s-ico { position: absolute; right: 9px; top: 50%; transform: translateY(-50%); color: var(--t3); font-size: 12px; pointer-events: none; }
.s-inp { background: var(--bg2); border: 1px solid var(--line); color: var(--t1); padding: 5px 28px 5px 10px; border-radius: var(--r); font-family: var(--font); font-size: 12px; outline: none; width: 200px; transition: border-color .2s; }
.s-inp:focus { border-color: var(--accent); }
.s-inp::placeholder { color: var(--t3); }
.chips { display: flex; gap: 4px; flex-shrink: 0; }
.chip { padding: 4px 11px; border-radius: 20px; font-size: 11px; font-weight: 600; border: 1px solid var(--line); color: var(--t3); background: none; cursor: pointer; transition: all .15s; white-space: nowrap; user-select: none; }
.chip:hover { color: var(--t2); border-color: var(--line2); }
.chip.on { color: #fff; border-color: transparent; }
.chip.on.all { background: var(--accent); }
.chip.on.cr  { background: var(--red); }
.chip.on.sc  { background: var(--orange); }
.chip.on.po  { background: var(--accent); }
.chip.on.di  { background: var(--purple); }
.chip.on.ec  { background: var(--green); }
.chip.on.mi  { background: #7f1d1d; }
.chip.on.en  { background: var(--teal); }
.chip.on.ku  { background: #78350f; }
.fdiv { width: 1px; height: 18px; background: var(--line); flex-shrink: 0; }
.pd-sel { background: var(--bg2); border: 1px solid var(--line); color: var(--t2); padding: 4px 8px; border-radius: var(--r); font-family: var(--mono); font-size: 10px; outline: none; cursor: pointer; flex-shrink: 0; }
.cd-badge { font-size: 10px; color: var(--green); font-family: var(--mono); background: var(--g2); padding: 3px 8px; border-radius: 4px; border: 1px solid rgba(22,163,74,.2); flex-shrink: 0; }
.ref-btn { display: flex; align-items: center; gap: 4px; background: none; border: 1px solid var(--line); color: var(--t3); padding: 4px 10px; border-radius: var(--r); cursor: pointer; font-size: 11px; font-family: var(--font); transition: all .15s; flex-shrink: 0; }
.ref-btn:hover { border-color: var(--accent); color: var(--accent); }
.spin { animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ══ LAYOUT ══ */
.layout { display: grid; grid-template-columns: 210px 1fr 230px; padding-top: 96px; min-height: 100vh; max-width: 1440px; margin: 0 auto; }
@media(max-width:1100px) { .layout { grid-template-columns: 0 1fr 0; } }

/* ══ LEFT SIDEBAR — KEYWORD GROUPS ══ */
.sl { border-left: 1px solid var(--line); padding: 14px 10px; position: sticky; top: 96px; height: calc(100vh - 96px); overflow-y: auto; display: flex; flex-direction: column; gap: 0; }
.sl::-webkit-scrollbar { width: 2px; }
.sl::-webkit-scrollbar-thumb { background: var(--line2); }
.sl-hd { font-size: 9px; color: var(--t3); font-family: var(--mono); letter-spacing: .8px; text-transform: uppercase; padding-bottom: 8px; margin-bottom: 6px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; }
.sl-add { font-size: 11px; color: var(--accent); cursor: pointer; opacity: .7; transition: opacity .15s; }
.sl-add:hover { opacity: 1; }
.kg { margin-bottom: 12px; }
.kg-hd { display: flex; align-items: center; gap: 6px; padding: 4px 6px; border-radius: var(--r); cursor: pointer; user-select: none; }
.kg-hd:hover { background: var(--bg2); }
.kg-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.kg-name { font-size: 11px; font-weight: 600; color: var(--t2); flex: 1; }
.kg-del { font-size: 12px; color: var(--t3); opacity: 0; cursor: pointer; transition: opacity .15s; }
.kg-hd:hover .kg-del { opacity: .6; }
.kg-del:hover { color: var(--red); opacity: 1 !important; }
.kg-cnt { font-size: 10px; color: var(--t3); font-family: var(--mono); }
.kt { display: flex; flex-wrap: wrap; gap: 3px; padding: 3px 6px 6px; }
.kw { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: var(--bg3); color: var(--t3); font-family: var(--mono); cursor: pointer; transition: all .15s; border: 1px solid transparent; display: inline-flex; align-items: center; gap: 3px; }
.kw:hover { color: var(--t1); border-color: var(--line2); }
.kw.on { background: var(--a3); color: var(--accent); border-color: rgba(37,99,235,.25); }
.kw-x { opacity: 0; font-size: 11px; line-height: 1; cursor: pointer; }
.kw:hover .kw-x { opacity: .5; }
.kw-x:hover { opacity: 1 !important; color: var(--red); }
.kg-add-row { display: flex; gap: 5px; padding: 3px 6px 6px; }
.kg-add-inp { flex: 1; background: var(--bg3); border: 1px solid var(--line); color: var(--t1); padding: 4px 7px; border-radius: 4px; font-family: var(--font); font-size: 11px; outline: none; }
.kg-add-inp:focus { border-color: var(--accent); }
.kg-add-btn { background: var(--a3); border: 1px solid rgba(37,99,235,.2); color: var(--accent); padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; white-space: nowrap; }

/* ══ FEED ══ */
.feed { border-left: 1px solid var(--line); border-right: 1px solid var(--line); }

/* Briefing */
.brief { background: linear-gradient(135deg, var(--a4), transparent); border-bottom: 1px solid rgba(37,99,235,.1); padding: 12px 18px; cursor: pointer; user-select: none; }
.brief:hover { background: var(--a3); }
.brief-hd { display: flex; align-items: center; justify-content: space-between; }
.brief-t { font-size: 12px; font-weight: 700; color: var(--accent); display: flex; align-items: center; gap: 5px; }
.brief-d { font-size: 10px; color: var(--t3); font-family: var(--mono); }
.brief-body { font-size: 13px; color: var(--t2); line-height: 1.7; margin-top: 8px; display: none; }
.brief.open .brief-body { display: block; }
.brief-stats { display: flex; gap: 14px; margin-top: 6px; }
.bst { font-size: 10px; color: var(--t3); font-family: var(--mono); }
.bst b { color: var(--t1); font-weight: 600; }

/* Feed header */
.feed-hd { padding: 9px 18px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; background: rgba(6,8,12,.9); position: sticky; top: 96px; z-index: 100; gap: 10px; }
.feed-info { font-size: 11px; color: var(--t3); font-family: var(--mono); }
.feed-info b { color: var(--t1); font-weight: 600; }
.sort-sel { background: var(--bg3); border: 1px solid var(--line); color: var(--t2); padding: 4px 7px; border-radius: var(--r); font-size: 10px; font-family: var(--mono); outline: none; cursor: pointer; }

/* ══ NEWS CARD ══ */
.card { border-bottom: 1px solid var(--line); padding: 16px 18px; transition: background .15s; border-right: 3px solid transparent; }
.card:hover { background: rgba(255,255,255,.013); }
.card.s-cr { border-right-color: var(--red); }
.card.s-hi { border-right-color: var(--orange); }
.card.s-me { border-right-color: var(--gold); }

/* Card header */
.c-hd { display: flex; align-items: center; gap: 7px; margin-bottom: 8px; flex-wrap: wrap; }
.c-src { display: flex; align-items: center; gap: 6px; }
.c-favicon { width: 16px; height: 16px; border-radius: 3px; object-fit: cover; flex-shrink: 0; }
.c-favicon-fb { width: 16px; height: 16px; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 7px; font-weight: 700; font-family: var(--mono); flex-shrink: 0; }
.c-sname { font-size: 11px; font-weight: 700; color: var(--t2); letter-spacing: .2px; }
.c-time { font-size: 10px; color: var(--t3); font-family: var(--mono); margin-right: auto; }
.sig { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; font-family: var(--mono); }
.sig.cr { background: var(--r2); color: #f87171; }
.sig.hi { background: var(--or2); color: #fb923c; }
.sig.me { background: var(--go2); color: #fbbf24; }
.sig.lo { background: var(--bg3); color: var(--t3); }
.cat { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; font-family: var(--mono); }
.cat.sc { background: var(--or2); color: #fb923c; }
.cat.po { background: var(--a3); color: #60a5fa; }
.cat.di { background: var(--pu2); color: #a78bfa; }
.cat.ec { background: var(--g2); color: #4ade80; }
.cat.mi { background: rgba(127,29,29,.2); color: #fca5a5; }
.cat.en { background: var(--te2); color: #2dd4bf; }
.cat.ku { background: rgba(120,53,15,.2); color: #fcd34d; }
.cat.ot { background: var(--bg3); color: var(--t3); }

/* Title */
.c-title { font-size: 15px; font-weight: 700; color: var(--t1); line-height: 1.5; margin-bottom: 10px; }
.c-title a { color: inherit; text-decoration: none; }
.c-title a:hover { color: var(--accent); text-decoration: underline; text-decoration-color: rgba(37,99,235,.4); }

/* Summary box - always visible */
.c-summary { font-size: 12px; color: var(--t2); line-height: 1.7; margin-bottom: 10px; padding: 9px 12px; background: var(--bg2); border-radius: var(--r); border-right: 2px solid var(--accent); }

/* Tabs */
.tabs-wrap { margin-bottom: 8px; }
.tabs-nav { display: flex; border-bottom: 1px solid var(--line); margin-bottom: 10px; }
.tb { padding: 5px 13px; font-size: 10px; font-weight: 600; color: var(--t3); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .15s; user-select: none; font-family: var(--mono); letter-spacing: .3px; text-transform: uppercase; }
.tb:hover { color: var(--t2); }
.tb.on { color: var(--accent); border-bottom-color: var(--accent); }
.tp { display: none; }
.tp.on { display: block; }
.tr-txt { font-size: 13px; color: var(--t1); line-height: 1.85; border-right: 2px solid var(--accent); padding-right: 12px; }
.or-txt { font-size: 12px; color: var(--t3); line-height: 1.75; direction: ltr; text-align: left; border-left: 2px solid var(--line2); padding-left: 11px; font-family: Georgia, serif; }
.an-box { background: var(--a4); border: 1px solid rgba(37,99,235,.1); border-radius: var(--r); padding: 11px 13px; }
.an-lbl { font-size: 9px; font-weight: 700; color: var(--accent); font-family: var(--mono); letter-spacing: .5px; text-transform: uppercase; margin-bottom: 6px; }
.an-txt { font-size: 13px; color: var(--t1); line-height: 1.8; }
.actors-row { margin-top: 8px; padding-top: 6px; border-top: 1px solid rgba(37,99,235,.08); }
.atag { background: var(--go2); color: var(--gold); padding: 2px 6px; border-radius: 3px; font-size: 10px; font-family: var(--mono); display: inline-block; margin: 1px 2px 1px 0; font-weight: 600; }

/* Translate result */
.tr-result { margin-top: 8px; padding: 9px 12px; background: var(--te2); border: 1px solid rgba(13,148,136,.15); border-radius: var(--r); font-size: 12px; color: var(--t1); line-height: 1.8; border-right: 2px solid var(--teal); display: none; }
.tr-result.show { display: block; }

/* Card footer */
.c-foot { display: flex; align-items: center; gap: 7px; margin-top: 10px; padding-top: 9px; border-top: 1px solid var(--line); flex-wrap: wrap; }
.c-link { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; font-weight: 600; color: var(--t3); text-decoration: none; font-family: var(--mono); transition: color .15s; border: 1px solid var(--line); padding: 3px 8px; border-radius: var(--r); }
.c-link:hover { color: var(--accent); border-color: rgba(37,99,235,.3); background: var(--a4); }
.tr-btn { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; font-weight: 600; color: var(--teal); border: 1px solid rgba(13,148,136,.25); background: var(--te2); padding: 3px 8px; border-radius: var(--r); cursor: pointer; transition: all .15s; font-family: var(--font); }
.tr-btn:hover { background: rgba(13,148,136,.2); }
.mkws { display: flex; gap: 3px; flex-wrap: wrap; flex: 1; }
.mkw { font-size: 10px; padding: 2px 5px; background: var(--a3); color: var(--accent); border-radius: 3px; font-family: var(--mono); font-weight: 600; }

/* ══ PAGINATION ══ */
.pagination { display: flex; align-items: center; justify-content: center; gap: 5px; padding: 18px; border-top: 1px solid var(--line); background: var(--bg1); flex-wrap: wrap; }
.pg-btn { min-width: 34px; height: 32px; padding: 0 8px; display: flex; align-items: center; justify-content: center; border-radius: var(--r); border: 1px solid var(--line); background: var(--bg2); color: var(--t2); cursor: pointer; font-family: var(--mono); font-size: 11px; font-weight: 600; transition: all .15s; }
.pg-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: var(--a3); }
.pg-btn:disabled { opacity: .2; cursor: not-allowed; }
.pg-btn.on { background: var(--accent); border-color: var(--accent); color: #fff; }
.pg-dots { font-size: 12px; color: var(--t3); padding: 0 4px; }
.pg-info { font-size: 10px; color: var(--t3); font-family: var(--mono); padding: 0 8px; border-right: 1px solid var(--line); }

/* Skeleton */
.skel { padding: 16px 18px; border-bottom: 1px solid var(--line); }
.sk { height: 12px; background: var(--bg3); border-radius: 3px; margin-bottom: 8px; animation: sh 1.4s infinite; }
.sk.s { width: 33%; } .sk.m { width: 62%; }
@keyframes sh { 0%,100%{opacity:.25} 50%{opacity:.6} }
.empty { text-align: center; padding: 60px 20px; color: var(--t3); }
.empty-i { font-size: 34px; margin-bottom: 8px; }

/* New toast */
.ntost { position: fixed; top: 106px; left: 50%; transform: translateX(-50%) translateY(-8px); background: var(--accent); color: #fff; padding: 7px 16px; border-radius: 20px; font-size: 11px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 20px rgba(37,99,235,.4); z-index: 280; opacity: 0; pointer-events: none; transition: all .25s; }
.ntost.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: all; }

/* ══ RIGHT SIDEBAR ══ */
.sr { padding: 14px 10px; position: sticky; top: 96px; height: calc(100vh - 96px); overflow-y: auto; }
.sr::-webkit-scrollbar { width: 2px; }
.sr::-webkit-scrollbar-thumb { background: var(--line2); }
.sr-sec { margin-bottom: 18px; }
.sr-hd { font-size: 9px; color: var(--t3); font-family: var(--mono); letter-spacing: .8px; text-transform: uppercase; padding-bottom: 7px; margin-bottom: 8px; border-bottom: 1px solid var(--line); font-weight: 600; }

/* Critical cards */
.crit-c { background: var(--r2); border: 1px solid rgba(220,38,38,.15); border-radius: var(--r); padding: 8px 10px; margin-bottom: 5px; cursor: pointer; transition: background .15s; }
.crit-c:hover { background: rgba(220,38,38,.15); }
.crit-t { font-size: 11px; font-weight: 600; color: var(--t1); line-height: 1.4; margin-bottom: 3px; }
.crit-m { font-size: 10px; color: var(--t3); font-family: var(--mono); }

/* Source rows with checkbox */
.src-row { display: flex; align-items: center; gap: 6px; padding: 4px 5px; border-radius: var(--r); cursor: pointer; transition: background .15s; margin-bottom: 2px; user-select: none; }
.src-row:hover { background: var(--bg2); }
.src-chk { width: 14px; height: 14px; border-radius: 3px; border: 1.5px solid var(--line2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .15s; font-size: 9px; }
.src-row.on .src-chk { background: var(--accent); border-color: var(--accent); color: #fff; }
.src-favicon { width: 14px; height: 14px; border-radius: 2px; object-fit: cover; flex-shrink: 0; }
.src-favicon-fb { width: 14px; height: 14px; border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 7px; font-weight: 700; font-family: var(--mono); flex-shrink: 0; }
.src-n { font-size: 11px; color: var(--t2); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
.src-row.on .src-n { color: var(--accent); }
.src-cnt { font-size: 9px; color: var(--t3); font-family: var(--mono); }

/* Source filter action buttons */
.src-actions { display: flex; gap: 5px; margin-bottom: 8px; }
.src-act-btn { flex: 1; background: var(--bg3); border: 1px solid var(--line); color: var(--t3); padding: 4px 6px; border-radius: var(--r); font-size: 10px; font-family: var(--font); cursor: pointer; transition: all .15s; text-align: center; }
.src-act-btn:hover { color: var(--t1); border-color: var(--line2); }
.src-act-btn.apply { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
.src-act-btn.apply:hover { background: var(--a2); }

/* ══ MODALS ══ */
.ov { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 500; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .2s; }
.ov.open { opacity: 1; pointer-events: all; }
.mod { background: var(--bg2); border: 1px solid var(--line2); border-radius: var(--r3); padding: 22px; width: 400px; max-width: 95vw; transform: translateY(-10px); transition: transform .2s; }
.ov.open .mod { transform: translateY(0); }
.mod-t { font-size: 14px; font-weight: 700; margin-bottom: 14px; }
.m-inp { width: 100%; background: var(--bg3); border: 1px solid var(--line); color: var(--t1); padding: 8px 11px; border-radius: var(--r); font-family: var(--font); font-size: 13px; outline: none; transition: border-color .2s; margin-bottom: 8px; }
.m-inp:focus { border-color: var(--accent); }
.m-btns { display: flex; gap: 8px; justify-content: flex-end; }

<script>
/* ══ AUTH ══ */
const _sess = JSON.parse(localStorage.getItem('iq_session')||'null');
if (!_sess || new Date(_sess.expires) < new Date()) window.location.href = 'login.html';
function logout() { localStorage.removeItem('iq_session'); window.location.href = 'login.html'; }

/* ══ CONFIG ══ */
const SB_URL = localStorage.getItem('sb_url') || '';
const SB_KEY = localStorage.getItem('sb_key') || '';
const PAGE_SIZE = 50;
const MAIN_ADMIN = 'admin'; // Only main admin sees API button

/* ══ STATE ══ */
let filt = 'all', kwF = '', srch = '';
let selectedSrcIds = []; // empty = all sources
let curPage = 1, totalCount = 0;
let arts = [];
let cdSecs = 900, cdTimer = null;
let srchTimer = null;
let allSrcs = []; // all available sources from DB
let kgs = JSON.parse(localStorage.getItem('iq_kgs') || 'null') || defKgs();

/* ══ CONSTANTS ══ */
const RC = { western:'#3b82f6', arab:'#f59e0b', iraqi:'#22c55e', iranian:'#ef4444', turkish:'#8b5cf6', international:'#14b8a6', kurdish:'#f97316' };
const CA = { security:'أمن', politics:'سياسة', diplomacy:'دبلوماسية', economy:'اقتصاد', military:'عسكري', energy:'طاقة', kurdistan:'كردستان', other:'أخرى' };
const SA = { critical:'حرجة', high:'عالية', medium:'متوسطة', low:'منخفضة' };
const SIG_I = { critical:'🔴', high:'🟠', medium:'🟡', low:'⚪' };
const CAT_C = { security:'sc', politics:'po', diplomacy:'di', economy:'ec', military:'mi', energy:'en', kurdistan:'ku', other:'ot' };
const SIG_C = { critical:'cr', high:'hi', medium:'me', low:'lo' };
const SIG_BC = { critical:'s-cr', high:'s-hi', medium:'s-me', low:'' };

function defKgs() {
  return [
    { id:'g1', name:'العراق — أساسي', color:'#3b82f6', kws:['العراق','بغداد','iraq','baghdad','#العراق','#Iraq'] },
    { id:'g2', name:'الفصائل والحشد', color:'#ef4444', kws:['الحشد الشعبي','فصائل','PMF','كتائب','hashd'] },
    { id:'g3', name:'كردستان', color:'#f97316', kws:['كردستان','البيشمركة','بارزاني','kurdistan','peshmerga'] },
    { id:'g4', name:'النفط والطاقة', color:'#14b8a6', kws:['النفط','البصرة','أوبك','iraq oil','basra'] },
    { id:'g5', name:'الدبلوماسية', color:'#8b5cf6', kws:['السوداني','إيران العراق','iran iraq'] },
  ];
}

/* ══ USER SETUP ══ */
function setupUser() {
  const u = _sess;
  document.getElementById('user-badge').textContent = `${u.name} · ${u.role==='admin'?'مدير':u.role==='editor'?'محرر':'مشاهد'}`;
  // API button: only main admin (username === MAIN_ADMIN)
  if (u.username !== MAIN_ADMIN) document.getElementById('api-btn').style.display = 'none';
  // Add button: hide for viewers
  if (u.role === 'viewer') document.getElementById('add-btn').style.display = 'none';
  // Users management: only admins
  if (u.role === 'admin') document.getElementById('users-btn').style.display = '';
}

/* ══ SUPABASE ══ */
async function sb(table, params = '') {
  if (!SB_URL || !SB_KEY) return { data: demoData(), count: demoData().length };
  try {
    const r = await fetch(`${SB_URL}/rest/v1/${table}${params}`, {
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Prefer': 'count=exact' }
    });
    const cnt = parseInt(r.headers.get('Content-Range')?.split('/')[1] || '0');
    const d = await r.json();
    return { data: Array.isArray(d) ? d : [], count: cnt };
  } catch { return { data: [], count: 0 }; }
}

/* ══ CLEAN TEXT (strip HTML) ══ */
function clean(s) {
  return (s||'').replace(/<[^>]*>/g, ' ').replace(/&nbsp;/g,' ').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/\s+/g,' ').trim();
}

/* ══ LOAD PAGE ══ */
async function loadPage(page) {
  curPage = page;
  const el = document.getElementById('feed-items');
  el.innerHTML = '<div class="skel"><div class="sk m"></div><div class="sk"></div><div class="sk s"></div></div>'.repeat(5);

  const sortF = document.getElementById('ss').value;
  const period = document.getElementById('period').value;
  const offset = (page - 1) * PAGE_SIZE;

  let p = `?select=id,title_ar,title_original,body_ar,body_original,original_url,category,importance_score,published_at,iraq_keywords,source_id,sources(id,name,region,website_url),analyses(summary_ar,actors,significance,stance)`;
  p += `&mentions_iraq=eq.true&order=${sortF}.desc,published_at.desc&limit=${PAGE_SIZE}&offset=${offset}`;

  if (filt === 'critical') p += `&importance_score=gte.80`;
  else if (['security','politics','diplomacy','economy','military','energy','kurdistan'].includes(filt)) p += `&category=eq.${filt}`;
  if (period) p += `&published_at=gte.${new Date(Date.now() - parseInt(period)*3600000).toISOString()}`;
  if (srch) p += `&or=(title_ar.ilike.*${encodeURIComponent(srch)}*,title_original.ilike.*${encodeURIComponent(srch)}*)`;
  // Source filter
  if (selectedSrcIds.length > 0) p += `&source_id=in.(${selectedSrcIds.join(',')})`;

  const res = await sb('articles', p);
  totalCount = res.count;

  // Deduplicate by title similarity
  const seen = new Set();
  arts = res.data.filter(a => {
    const key = (a.title_ar || a.title_original || '').slice(0, 40).toLowerCase().replace(/\s+/g,'');
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  }).map(a => ({
    ...a,
    sn: a.sources?.name || '',
    sr: a.sources?.region || 'international',
    sw: a.sources?.website_url || '',
    sum: Array.isArray(a.analyses) && a.analyses[0]?.summary_ar || '',
    act: Array.isArray(a.analyses) && a.analyses[0]?.actors || '',
    sig: Array.isArray(a.analyses) && a.analyses[0]?.significance || 'medium',
  }));

  const pages = Math.max(1, Math.ceil(totalCount / PAGE_SIZE));
  document.getElementById('fc').textContent = totalCount.toLocaleString('ar');
  document.getElementById('pg-c').textContent = page;
  document.getElementById('pg-t').textContent = pages;

  renderFeed();
  renderPagination(page, pages);
  window.scrollTo({ top: 96, behavior: 'smooth' });
}

/* ══ RENDER FEED ══ */
function renderFeed() {
  const el = document.getElementById('feed-items');
  if (!arts.length) {
    el.innerHTML = `<div class="empty"><div class="empty-i">📭</div><div style="font-weight:600;margin-bottom:4px">لا توجد أخبار</div><div style="font-size:12px;color:var(--t3)">جرّب تغيير الفلتر أو الفترة الزمنية</div></div>`;
    return;
  }
  el.innerHTML = arts.map((a, i) => buildCard(a, i)).join('');
}

function getFavicon(url) {
  if (!url) return null;
  try { return `https://www.google.com/s2/favicons?domain=${new URL(url).hostname}&sz=16`; } catch { return null; }
}

function buildCard(a, i) {
  const sig = a.sig || 'medium';
  const cat = a.category || 'other';
  const cleanTitle = clean(a.title_ar || a.title_original || '—');
  const cleanBody  = clean(a.body_original || '');
  const cleanAr    = clean(a.body_ar || '');
  const hasTr = cleanAr.length > 20;
  const hasOr = cleanBody.length > 20;
  const hasAn = a.sum && a.sum.length > 10;
  const matched = kgs.flatMap(g => g.kws).filter(k => typeof k === 'string' && (cleanTitle.includes(k) || cleanAr.includes(k))).slice(0,3);
  const favicon = getFavicon(a.sw || a.original_url);
  const srcClr = RC[a.sr] || '#3b82f6';
  const srcIni = a.sn.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase().slice(0,2);

  const srcIconHtml = favicon
    ? `<img class="c-favicon" src="${favicon}" alt="" onerror="this.outerHTML='<div class=c-favicon-fb style=background:${srcClr}22;color:${srcClr}>${srcIni}</div>'">`
    : `<div class="c-favicon-fb" style="background:${srcClr}22;color:${srcClr}">${srcIni}</div>`;

  const tabsHtml = (hasTr || hasOr || hasAn) ? `
    <div class="tabs-wrap">
      <div class="tabs-nav">
        ${hasTr ? `<div class="tb on" onclick="swTab(this)">TRANSLATION</div>` : ''}
        ${hasOr ? `<div class="tb${!hasTr?' on':''}" onclick="swTab(this)">ORIGINAL</div>` : ''}
        ${hasAn ? `<div class="tb" onclick="swTab(this)">ANALYSIS</div>` : ''}
      </div>
      ${hasTr ? `<div class="tp on"><div class="tr-txt">${esc(cleanAr).slice(0,700)}${cleanAr.length>700?'...':''}</div></div>` : ''}
      ${hasOr ? `<div class="tp${!hasTr?' on':''}"><div class="or-txt">${esc(cleanBody).slice(0,600)}${cleanBody.length>600?'...':''}</div></div>` : ''}
      ${hasAn ? `<div class="tp"><div class="an-box"><div class="an-lbl">✦ تحليل</div><div class="an-txt">${esc(a.sum)}</div>${a.act?`<div class="actors-row">${a.act.split(/[،,]/).slice(0,5).map(s=>`<span class="atag">${esc(s.trim())}</span>`).join('')}</div>`:''}</div></div>` : ''}
    </div>` : '';

  const summaryHtml = (!hasTr && !hasAn && cleanBody.length > 30)
    ? `<div class="c-summary">${esc(cleanBody.slice(0,180))}${cleanBody.length>180?'...':''}</div>` : '';

  return `<div class="card ${SIG_BC[sig]||''}">
  <div class="c-hd">
    <div class="c-src">${srcIconHtml}<span class="c-sname">${esc(a.sn)}</span></div>
    <span class="c-time">${ago(a.published_at)}</span>
    <span class="sig ${SIG_C[sig]||'me'}">${SIG_I[sig]||'🟡'} ${SA[sig]||'متوسطة'}</span>
    <span class="cat ${CAT_C[cat]||'ot'}">${CA[cat]||'أخرى'}</span>
  </div>
  <div class="c-title">${a.original_url?`<a href="${a.original_url}" target="_blank" rel="noopener noreferrer">${esc(cleanTitle)}</a>`:esc(cleanTitle)}</div>
  ${summaryHtml}
  ${tabsHtml}
  <div class="c-foot">
    ${a.original_url?`<a href="${a.original_url}" target="_blank" rel="noopener noreferrer" class="c-link">↗ المصدر</a>`:''}
    ${!hasTr?`<button class="tr-btn" onclick="doTranslate(this,${i})">🌐 ترجمة</button>`:''}
    <div class="mkws">${matched.map(k=>`<span class="mkw">${esc(k)}</span>`).join('')}</div>
  </div>
  <div class="tr-result" id="trr${i}"></div>
</div>`;
}

/* ══ TABS ══ */
function swTab(el) {
  const wrap = el.closest('.tabs-wrap');
  if (!wrap) return;
  const tabs = wrap.querySelectorAll('.tb');
  const panes = wrap.querySelectorAll('.tp');
  const idx = Array.from(tabs).indexOf(el);
  tabs.forEach(t => t.classList.remove('on'));
  panes.forEach(p => p.classList.remove('on'));
  tabs[idx].classList.add('on');
  if (panes[idx]) panes[idx].classList.add('on');
}

/* ══ TRANSLATE ══ */
async function doTranslate(btn, idx) {
  const a = arts[idx];
  if (!a) return;
  const text = clean(a.body_original || a.title_original || '').slice(0, 500);
  if (!text) return;
  btn.textContent = '⏳';
  btn.disabled = true;
  const resDiv = document.getElementById('trr' + idx);
  try {
    const r = await fetch('https://api.mymemory.translated.net/get?q=' + encodeURIComponent(text) + '&langpair=en|ar');
    const d = await r.json();
    if (d.responseStatus === 200 && d.responseData?.translatedText) {
      resDiv.textContent = d.responseData.translatedText;
      resDiv.classList.add('show');
      btn.textContent = '✓ مترجم';
      btn.style.color = 'var(--green)';
    } else throw new Error();
  } catch {
    if (a.original_url) {
      resDiv.innerHTML = `<a href="https://translate.google.com/translate?sl=auto&tl=ar&u=${encodeURIComponent(a.original_url)}" target="_blank" rel="noopener" style="color:var(--accent);font-size:11px">↗ فتح في Google Translate</a>`;
      resDiv.classList.add('show');
    }
    btn.textContent = '↗';
    btn.disabled = false;
  }
}

/* ══ PAGINATION ══ */
function renderPagination(cur, total) {
  const el = document.getElementById('pagination');
  if (total <= 1) { el.innerHTML = ''; return; }

  let html = `<span class="pg-info">${((cur-1)*PAGE_SIZE+1).toLocaleString('ar')}–${Math.min(cur*PAGE_SIZE,totalCount).toLocaleString('ar')} من ${totalCount.toLocaleString('ar')}</span>`;
  html += `<button class="pg-btn" onclick="loadPage(${cur-1})" ${cur===1?'disabled':''}>←</button>`;

  const pages = [];
  if (total <= 7) { for(let i=1;i<=total;i++) pages.push(i); }
  else {
    pages.push(1);
    if (cur > 3) pages.push('…');
    for(let i=Math.max(2,cur-1);i<=Math.min(total-1,cur+1);i++) pages.push(i);
    if (cur < total-2) pages.push('…');
    pages.push(total);
  }

  pages.forEach(p => {
    if (p==='…') html += `<span class="pg-dots">…</span>`;
    else html += `<button class="pg-btn${p===cur?' on':''}" onclick="loadPage(${p})">${p}</button>`;
  });

  html += `<button class="pg-btn" onclick="loadPage(${cur+1})" ${cur===total?'disabled':''}>→</button>`;
  el.innerHTML = html;
}

/* ══ FILTERS ══ */
function setF(f, el) {
  filt = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
  el.classList.add('on');
  loadPage(1);
}

function onSearch() {
  clearTimeout(srchTimer);
  srchTimer = setTimeout(() => { srch = document.getElementById('srch').value.trim(); loadPage(1); }, 400);
}

/* ══ SOURCE FILTER ══ */
function renderSrcList() {
  const el = document.getElementById('src-list');
  if (!allSrcs.length) { el.innerHTML = '<div style="color:var(--t3);font-size:11px">لا توجد مصادر</div>'; return; }
  el.innerHTML = allSrcs.map(s => {
    const on = selectedSrcIds.length === 0 || selectedSrcIds.includes(s.id);
    const favicon = getFavicon(s.website_url);
    const clr = RC[s.region] || '#3b82f6';
    const ini = s.name.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase().slice(0,2);
    const iconHtml = favicon
      ? `<img class="src-favicon" src="${favicon}" alt="" onerror="this.outerHTML='<div class=src-favicon-fb style=background:${clr}22;color:${clr}>${ini}</div>'">`
      : `<div class="src-favicon-fb" style="background:${clr}22;color:${clr}">${ini}</div>`;
    return `<div class="src-row${on?' on':''}" onclick="toggleSrc('${s.id}')">
      <div class="src-chk">${on?'✓':''}</div>
      ${iconHtml}
      <div class="src-n">${esc(s.name)}</div>
    </div>`;
  }).join('');
}

function toggleSrc(id) {
  if (selectedSrcIds.length === 0) {
    // All selected → deselect one = select all except this
    selectedSrcIds = allSrcs.map(s=>s.id).filter(x=>x!==id);
  } else {
    if (selectedSrcIds.includes(id)) {
      selectedSrcIds = selectedSrcIds.filter(x=>x!==id);
      if (selectedSrcIds.length === 0) selectedSrcIds = []; // none selected = show all
    } else {
      selectedSrcIds.push(id);
      // If all selected, reset to empty
      if (selectedSrcIds.length === allSrcs.length) selectedSrcIds = [];
    }
  }
  renderSrcList();
}

function selectAllSrc(val) {
  selectedSrcIds = val ? [] : allSrcs.map(s=>s.id).slice(0,1); // empty=all, one that doesn't exist=none
  if (!val) selectedSrcIds = ['__none__'];
  renderSrcList();
}

function applySourceFilter() {
  if (selectedSrcIds.includes('__none__')) return;
  loadPage(1);
}

async function loadSrcs() {
  const res = await sb('sources', '?select=id,name,region,website_url&is_active=eq.true&order=trust_score.desc&limit=30');
  allSrcs = res.data;
  renderSrcList();
}

/* ══ CRITICAL EVENTS ══ */
async function loadCritical() {
  const since = new Date(Date.now() - 72*3600000).toISOString();
  const res = await sb('articles', `?select=title_ar,title_original,published_at,original_url,sources(name)&mentions_iraq=eq.true&importance_score=gte.80&published_at=gte.${since}&order=importance_score.desc&limit=5`);
  const el = document.getElementById('crit-list');
  if (!res.data.length) { el.innerHTML = '<div style="color:var(--t3);font-size:11px">لا أحداث حرجة ✓</div>'; return; }
  el.innerHTML = res.data.map(a => `
    <div class="crit-c" onclick="${a.original_url?`window.open('${a.original_url}','_blank')`:''}">
      <div class="crit-t">${esc(clean(a.title_ar||a.title_original||'—').slice(0,80))}</div>
      <div class="crit-m">${esc(a.sources?.name||'')} · ${ago(a.published_at)}</div>
    </div>`).join('');
}

/* ══ KEYWORD GROUPS ══ */
function saveKgs() { localStorage.setItem('iq_kgs', JSON.stringify(kgs)); }

function renderKgs() {
  document.getElementById('kg-list').innerHTML = kgs.map((g, gi) => `
    <div class="kg">
      <div class="kg-hd">
        <div class="kg-dot" style="background:${g.color}"></div>
        <div class="kg-name">${esc(g.name)}</div>
        <div class="kg-cnt">${g.kws.length}</div>
        <div class="kg-del" onclick="event.stopPropagation();delGroup(${gi})">🗑</div>
      </div>
      <div class="kt">
        ${g.kws.map((k, ki) => {
          const kstr = typeof k === 'string' ? k : (k.w || k.word || JSON.stringify(k));
          return `<span class="kw${kwF===kstr?' on':''}" onclick="fKw('${kstr.replace(/'/g,"\\'")}')">
            ${esc(kstr)}
            <span class="kw-x" onclick="event.stopPropagation();rmKw(${gi},${ki})">×</span>
          </span>`;
        }).join('')}
      </div>
      <div class="kg-add-row">
        <input class="kg-add-inp" id="ki${gi}" placeholder="+ كلمة جديدة" onkeydown="if(event.key==='Enter')addKw(${gi})">
        <button class="kg-add-btn" onclick="addKw(${gi})">+</button>
      </div>
    </div>`).join('');
}

function fKw(k) {
  kwF = kwF === k ? '' : k;
  document.getElementById('srch').value = kwF;
  srch = kwF;
  renderKgs(); loadPage(1);
}
function addKw(gi) {
  const inp = document.getElementById('ki'+gi);
  const val = inp.value.trim();
  if (!val) return;
  // Prevent duplicate
  if (kgs[gi].kws.some(k => (typeof k === 'string' ? k : k.w) === val)) { inp.value = ''; return; }
  kgs[gi].kws.push(val);
  saveKgs(); inp.value = ''; renderKgs();
}
function rmKw(gi, ki) { kgs[gi].kws.splice(ki, 1); saveKgs(); renderKgs(); }
function delGroup(gi) { if (!confirm(`حذف مجموعة "${kgs[gi].name}"؟`)) return; kgs.splice(gi, 1); saveKgs(); renderKgs(); }

function openAddG() { document.getElementById('ov-ag').classList.add('open'); document.getElementById('ag-n').focus(); }
function saveG() {
  const n = document.getElementById('ag-n').value.trim();
  const ks = document.getElementById('ag-k').value.split(/[,،]/).map(k=>k.trim()).filter(Boolean);
  if (!n) return;
  const cols = ['#3b82f6','#ef4444','#22c55e','#f59e0b','#8b5cf6','#14b8a6','#ea580c'];
  kgs.push({ id:'g'+Date.now(), name:n, color:cols[kgs.length%cols.length], kws:ks });
  saveKgs(); renderKgs(); closeOv('ov-ag');
  document.getElementById('ag-n').value=''; document.getElementById('ag-k').value='';
}
function closeOv(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.ov').forEach(o => o.addEventListener('click', e => { if(e.target===e.currentTarget) o.classList.remove('open'); }));

/* ══ BRIEFING ══ */
async function buildBrief() {
  const today = new Date().toLocaleDateString('ar-IQ', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  document.getElementById('brief-date').textContent = today;
  const res = await sb('articles', `?select=category,importance_score&mentions_iraq=eq.true&published_at=gte.${new Date(Date.now()-86400000).toISOString()}&limit=200`);
  const tot = res.count || res.data.length;
  const cr = res.data.filter(a=>(a.importance_score||0)>=80).length;
  const cats = {};
  res.data.forEach(a => { cats[a.category]=(cats[a.category]||0)+1; });
  const top = Object.entries(cats).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('brief-stats').innerHTML = `
    <div class="bst">إجمالي: <b>${tot}</b></div>
    <div class="bst">حرجة: <b style="color:#f87171">${cr}</b></div>
    ${top?`<div class="bst">الأبرز: <b>${CA[top[0]]||top[0]}</b></div>`:''}`;
  document.getElementById('brief-body').textContent = `رُصد ${tot} خبر خلال آخر 24 ساعة. ${cr>0?`منها ${cr} حدث حرج.`:''} ${top?'أبرز التغطيات في ملف '+(CA[top[0]]||top[0])+'.':''}`;
}
function toggleBrief() { document.getElementById('brief').classList.toggle('open'); }

/* ══ AUTO REFRESH ══ */
function startCD() {
  clearInterval(cdTimer); cdSecs = 900;
  cdTimer = setInterval(() => {
    cdSecs--;
    const m=Math.floor(cdSecs/60), s=cdSecs%60;
    document.getElementById('cd').textContent = `⟳ ${m}:${String(s).padStart(2,'0')}`;
    if (cdSecs<=0) refresh();
  }, 1000);
}
async function refresh() {
  document.getElementById('ri').classList.add('spin');
  await Promise.all([loadPage(curPage), loadCritical(), loadSrcs(), buildBrief()]);
  document.getElementById('ri').classList.remove('spin');
  startCD();
}
setInterval(async()=>{
  if(!SB_URL||!SB_KEY||!arts[0]) return;
  const res = await sb('articles',`?select=id&mentions_iraq=eq.true&published_at=gt.${arts[0].published_at}&limit=1`);
  if(res.count>0){const t=document.getElementById('ntost');t.textContent=`↑ ${res.count} خبر جديد`;t.classList.add('show');}
},60000);
function applyNew(){document.getElementById('ntost').classList.remove('show');loadPage(1);}

/* ══ HELPERS ══ */
function ago(iso) {
  if (!iso) return '—';
  const d = Math.floor((Date.now()-new Date(iso))/1000);
  if (d<60) return 'الآن';
  if (d<3600) return `${Math.floor(d/60)}د`;
  if (d<86400) return `${Math.floor(d/3600)}س`;
  return new Date(iso).toLocaleDateString('ar-IQ',{month:'short',day:'numeric'});
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function updateClock(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('ar-IQ',{hour12:false,timeZone:'Asia/Baghdad'})+' بغداد';}
