<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الراصد — رصد العراق</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0a0e13;
  --bg1:    #0f1520;
  --bg2:    #141d2b;
  --bg3:    #1a2438;
  --line:   #1e2d42;
  --line2:  #263548;
  --t1:     #e2e8f0;
  --t2:     #7a90a8;
  --t3:     #3d5068;
  --accent: #2563eb;
  --gold:   #c8913a;
  --red:    #dc2626;
  --orange: #c2622a;
  --green:  #16a34a;
  --teal:   #0d7c6e;
  --font:   'IBM Plex Sans Arabic', sans-serif;
  --mono:   'JetBrains Mono', monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--t1);
  min-height:100vh;
  font-size:14px;
  line-height:1.6;
}

/* ── TOPBAR ── */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:200;
  background:rgba(10,14,19,.95);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
  padding:0 20px;
  height:56px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
}
.tb-brand{display:flex;align-items:center;gap:10px}
.tb-logo{
  width:32px;height:32px;
  background:var(--accent);
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-weight:600;color:#fff;font-size:13px;
}
.tb-name{font-size:15px;font-weight:600;letter-spacing:.2px}
.tb-live{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--green);font-family:var(--mono)}
.tb-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}
.tb-right{display:flex;align-items:center;gap:10px}
.tb-btn{
  background:var(--bg3);border:1px solid var(--line);
  color:var(--t2);padding:6px 14px;border-radius:6px;
  cursor:pointer;font-family:var(--font);font-size:12px;
  transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:5px;
}
.tb-btn:hover{background:var(--line);color:var(--t1)}
.tb-time{font-family:var(--mono);font-size:11px;color:var(--t3)}

/* ── FILTERS BAR ── */
.filters{
  position:fixed;top:56px;left:0;right:0;z-index:190;
  background:rgba(10,14,19,.92);
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);
  padding:0 20px;
  height:48px;
  display:flex;align-items:center;gap:8px;
  overflow-x:auto;
}
.filters::-webkit-scrollbar{display:none}
.f-chip{
  padding:5px 14px;border-radius:20px;
  font-size:12px;font-weight:500;
  border:1px solid var(--line);
  color:var(--t2);background:none;
  cursor:pointer;transition:all .2s;
  white-space:nowrap;user-select:none;
  flex-shrink:0;
}
.f-chip:hover{border-color:var(--line2);color:var(--t1)}
.f-chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.f-chip.red.on  {background:var(--red);border-color:var(--red)}
.f-chip.gold.on {background:var(--gold);border-color:var(--gold)}
.f-chip.green.on{background:var(--green);border-color:var(--green)}
.f-chip.teal.on {background:var(--teal);border-color:var(--teal)}
.f-divider{width:1px;height:20px;background:var(--line);flex-shrink:0}

/* ── LAYOUT ── */
.layout{
  display:grid;
  grid-template-columns:260px 1fr 280px;
  gap:0;
  padding-top:104px;
  min-height:100vh;
  max-width:1400px;
  margin:0 auto;
}
@media(max-width:1100px){.layout{grid-template-columns:0 1fr 0}}
@media(max-width:700px){.layout{grid-template-columns:1fr}}

/* ── LEFT SIDEBAR ── */
.sidebar-left{
  padding:20px 16px;
  border-left:1px solid var(--line);
  position:sticky;top:104px;height:calc(100vh - 104px);
  overflow-y:auto;
}
.sidebar-left::-webkit-scrollbar{width:3px}
.sidebar-left::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px}

.sl-section{margin-bottom:24px}
.sl-title{font-size:10px;color:var(--t3);font-family:var(--mono);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--line)}

.src-item{
  display:flex;align-items:center;gap:8px;
  padding:6px 8px;border-radius:6px;
  cursor:pointer;transition:background .15s;
  margin-bottom:2px;
}
.src-item:hover{background:var(--bg2)}
.src-item.active{background:rgba(37,99,235,.1)}
.src-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.src-name{font-size:12px;color:var(--t2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.src-item.active .src-name{color:var(--accent)}
.src-count{font-family:var(--mono);font-size:10px;color:var(--t3)}

/* ── FEED ── */
.feed{padding:0 0 60px;border-right:1px solid var(--line);border-left:1px solid var(--line)}

.feed-header{
  padding:16px 20px;
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:104px;z-index:100;
  background:rgba(10,14,19,.95);
  backdrop-filter:blur(8px);
}
.feed-title{font-size:13px;font-weight:600;color:var(--t1)}
.feed-count{font-size:11px;color:var(--t3);font-family:var(--mono)}
.refresh-btn{
  display:flex;align-items:center;gap:5px;
  background:none;border:1px solid var(--line);
  color:var(--t2);padding:5px 12px;border-radius:6px;
  cursor:pointer;font-size:12px;font-family:var(--font);
  transition:all .2s;
}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent)}
.refresh-btn.spinning svg{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── NEWS CARD ── */
.card{
  border-bottom:1px solid var(--line);
  padding:18px 20px;
  transition:background .15s;
  cursor:default;
  animation:fadeIn .3s ease both;
}
.card:hover{background:rgba(255,255,255,.015)}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.card-meta{
  display:flex;align-items:center;gap:8px;
  margin-bottom:10px;flex-wrap:wrap;
}
.card-source{
  display:flex;align-items:center;gap:5px;
  font-size:12px;font-weight:600;color:var(--t2);
}
.src-avatar{
  width:20px;height:20px;border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;font-family:var(--mono);
  flex-shrink:0;
}
.card-time{font-size:11px;color:var(--t3);font-family:var(--mono)}
.card-region{font-size:10px;padding:2px 6px;border-radius:3px;font-family:var(--mono)}

.sig-badge{
  display:inline-flex;align-items:center;gap:3px;
  font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:3px;
  margin-right:auto;
}
.sig-critical{background:rgba(220,38,38,.15);color:#f87171;border:1px solid rgba(220,38,38,.25)}
.sig-high    {background:rgba(194,98,42,.15); color:#fb923c;border:1px solid rgba(194,98,42,.25)}
.sig-medium  {background:rgba(200,145,58,.15);color:#fbbf24;border:1px solid rgba(200,145,58,.25)}
.sig-low     {background:rgba(61,80,104,.15); color:var(--t3);border:1px solid var(--line)}

.card-cat{font-size:10px;padding:2px 7px;border-radius:3px;font-family:var(--mono)}
.cat-security  {background:rgba(220,38,38,.1); color:#f87171}
.cat-politics  {background:rgba(37,99,235,.1); color:#60a5fa}
.cat-diplomacy {background:rgba(200,145,58,.1);color:#fbbf24}
.cat-economy   {background:rgba(22,163,74,.1); color:#4ade80}
.cat-military  {background:rgba(194,98,42,.1); color:#fb923c}
.cat-energy    {background:rgba(13,124,110,.1);color:#2dd4bf}
.cat-kurdistan {background:rgba(124,58,237,.1);color:#a78bfa}
.cat-other     {background:var(--bg3);color:var(--t3)}

/* ── CARD TITLE ── */
.card-title{
  font-size:15px;font-weight:600;
  color:var(--t1);line-height:1.5;
  margin-bottom:10px;
}

/* ── CONTENT TABS ── */
.content-tabs{margin-bottom:10px}
.ctabs{display:flex;gap:0;border-bottom:1px solid var(--line);margin-bottom:12px}
.ctab{
  padding:6px 14px;font-size:11px;color:var(--t3);
  cursor:pointer;border-bottom:2px solid transparent;
  transition:all .15s;font-family:var(--mono);
  margin-bottom:-1px;
}
.ctab:hover{color:var(--t2)}
.ctab.on{color:var(--accent);border-bottom-color:var(--accent)}

.ctab-content{display:none;font-size:13px;line-height:1.8;color:var(--t2)}
.ctab-content.on{display:block}

.original-text{
  font-size:12px;color:var(--t3);line-height:1.7;
  border-right:2px solid var(--line2);
  padding-right:12px;
  font-family:Georgia,serif;
  direction:ltr;text-align:left;
}

.translation-text{
  color:var(--t1);line-height:1.8;
  border-right:2px solid var(--accent);
  padding-right:12px;
}

.analysis-box{
  background:rgba(37,99,235,.05);
  border:1px solid rgba(37,99,235,.15);
  border-radius:8px;padding:12px 14px;
}
.analysis-label{
  font-size:10px;color:var(--accent);
  font-family:var(--mono);letter-spacing:.5px;
  margin-bottom:6px;display:flex;align-items:center;gap:5px;
}
.analysis-text{font-size:13px;color:var(--t1);line-height:1.7}
.actors-row{
  margin-top:10px;padding-top:8px;
  border-top:1px solid rgba(37,99,235,.1);
  font-size:11px;color:var(--t3);
}
.actor-tag{
  display:inline-block;
  background:rgba(200,145,58,.1);color:var(--gold);
  padding:2px 7px;border-radius:3px;
  font-size:11px;font-family:var(--mono);
  margin:2px 3px 2px 0;
}

/* ── CARD FOOTER ── */
.card-footer{
  display:flex;align-items:center;gap:12px;
  margin-top:12px;padding-top:10px;
  border-top:1px solid var(--line);
}
.card-link{
  display:inline-flex;align-items:center;gap:4px;
  font-size:11px;color:var(--t3);text-decoration:none;
  font-family:var(--mono);transition:color .15s;
}
.card-link:hover{color:var(--accent)}
.kw-tags{display:flex;gap:4px;flex-wrap:wrap;flex:1}
.kw-tag{
  font-size:10px;padding:1px 6px;border-radius:3px;
  background:var(--bg3);color:var(--t3);
  font-family:var(--mono);
}

/* ── RIGHT SIDEBAR ── */
.sidebar-right{
  padding:20px 16px;
  position:sticky;top:104px;height:calc(100vh - 104px);
  overflow-y:auto;
}
.sidebar-right::-webkit-scrollbar{width:3px}
.sidebar-right::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px}

.sr-section{margin-bottom:24px}
.sr-title{font-size:10px;color:var(--t3);font-family:var(--mono);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--line)}

.trending-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:8px 0;border-bottom:1px solid var(--line);
  cursor:pointer;transition:opacity .15s;
}
.trending-item:hover{opacity:.75}
.trend-num{font-family:var(--mono);font-size:16px;font-weight:600;color:var(--line2);min-width:20px}
.trend-word{font-size:13px;color:var(--t1);font-weight:500}
.trend-count{font-size:11px;color:var(--t3);font-family:var(--mono)}

.critical-item{
  background:rgba(220,38,38,.05);
  border:1px solid rgba(220,38,38,.15);
  border-radius:8px;padding:10px 12px;
  margin-bottom:8px;cursor:pointer;
  transition:background .15s;
}
.critical-item:hover{background:rgba(220,38,38,.08)}
.critical-title{font-size:12px;font-weight:500;color:var(--t1);line-height:1.4;margin-bottom:4px}
.critical-meta{font-size:10px;color:var(--t3);font-family:var(--mono)}

/* ── SEARCH ── */
.search-wrap{
  padding:10px 20px;
  border-bottom:1px solid var(--line);
  background:rgba(10,14,19,.95);
}
.search-input{
  width:100%;background:var(--bg2);
  border:1px solid var(--line);color:var(--t1);
  padding:8px 14px;border-radius:8px;
  font-family:var(--font);font-size:13px;
  outline:none;transition:border-color .2s;
}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--t3)}

/* ── LOADING / EMPTY ── */
.loading{text-align:center;padding:60px 20px;color:var(--t3)}
.loading-spinner{
  width:24px;height:24px;border:2px solid var(--line);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .7s linear infinite;
  margin:0 auto 12px;
}
.empty{text-align:center;padding:60px 20px}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-text{color:var(--t3);font-size:14px}

/* ── NEW BADGE ── */
.new-badge{
  position:fixed;top:112px;left:50%;transform:translateX(-50%);
  background:var(--accent);color:#fff;
  padding:8px 20px;border-radius:20px;
  font-size:13px;cursor:pointer;
  box-shadow:0 4px 20px rgba(37,99,235,.4);
  z-index:150;display:none;
  transition:all .2s;
}
.new-badge:hover{background:#1d4ed8}
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="tb-brand">
    <div class="tb-logo">IQ</div>
    <div class="tb-name">الراصد</div>
    <div class="tb-live"><div class="tb-dot"></div>مباشر</div>
  </div>
  <div class="tb-right">
    <div class="tb-time" id="clock"></div>
    <a href="settings.html" class="tb-btn">⚙ الإعدادات</a>
    <a href="admin.html" class="tb-btn">+ إضافة</a>
    <button class="tb-btn" onclick="openConfig()">🔑 API</button>
  </div>
</header>

<!-- FILTERS -->
<div class="filters">
  <button class="f-chip on" onclick="setFilter('all',this)">الكل</button>
  <button class="f-chip red" onclick="setFilter('critical',this)">🔴 حرجة</button>
  <button class="f-chip" onclick="setFilter('security',this)">أمن</button>
  <button class="f-chip" onclick="setFilter('politics',this)">سياسة</button>
  <button class="f-chip" onclick="setFilter('diplomacy',this)">دبلوماسية</button>
  <button class="f-chip gold" onclick="setFilter('economy',this)">اقتصاد</button>
  <button class="f-chip" onclick="setFilter('military',this)">عسكري</button>
  <button class="f-chip teal" onclick="setFilter('energy',this)">طاقة</button>
  <button class="f-chip" onclick="setFilter('kurdistan',this)">كردستان</button>
  <div class="f-divider"></div>
  <button class="f-chip" onclick="setFilter('24h',this)">آخر 24س</button>
  <button class="f-chip" onclick="setFilter('48h',this)">آخر 48س</button>
  <button class="f-chip" onclick="setFilter('week',this)">هذا الأسبوع</button>
</div>

<!-- NEW ITEMS BADGE -->
<div class="new-badge" id="new-badge" onclick="loadNewItems()">
  ↑ أخبار جديدة — اضغط للتحديث
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- LEFT: SOURCES -->
  <aside class="sidebar-left" id="sidebar-left">
    <div class="sl-section">
      <div class="sl-title">المصادر النشطة</div>
      <div id="sources-list">
        <div style="color:var(--t3);font-size:12px;padding:8px">جاري التحميل...</div>
      </div>
    </div>
  </aside>

  <!-- FEED -->
  <main class="feed">
    <div class="feed-header">
      <div>
        <div class="feed-title">تدفق الأخبار — العراق</div>
        <div class="feed-count" id="feed-count">جاري التحميل...</div>
      </div>
      <button class="refresh-btn" id="refresh-btn" onclick="refresh()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.66 0 3-4.03 3-9s-1.34-9-3-9m0 18c-1.66 0-3-4.03-3-9s1.34-9 3-9"/></svg>
        تحديث
      </button>
    </div>

    <div class="search-wrap">
      <input class="search-input" id="search" placeholder="ابحث في الأخبار..." oninput="debounce()">
    </div>

    <div id="feed-items">
      <div class="loading">
        <div class="loading-spinner"></div>
        جاري جلب الأخبار...
      </div>
    </div>
  </main>

  <!-- RIGHT: TRENDING + CRITICAL -->
  <aside class="sidebar-right">
    <div class="sr-section">
      <div class="sr-title">🔴 الأحداث الحرجة</div>
      <div id="critical-list">
        <div style="color:var(--t3);font-size:12px">لا توجد أحداث حرجة</div>
      </div>
    </div>
    <div class="sr-section">
      <div class="sr-title">📈 الأكثر ذكراً</div>
      <div id="trending-list">
        <div style="color:var(--t3);font-size:12px">جاري التحليل...</div>
      </div>
    </div>
  </aside>

</div>

<script>
/* ═══════════════════════════════
   CONFIG
═══════════════════════════════ */
let SB_URL = localStorage.getItem('sb_url') || '';
let SB_KEY = localStorage.getItem('sb_key') || '';

const SOURCE_COLORS = {
  western:'#2563eb', arab:'#c8913a', iraqi:'#16a34a',
  iranian:'#dc2626', turkish:'#7c3aed', international:'#0d7c6e', kurdish:'#b45309'
};

const CAT_AR = {
  security:'أمن', politics:'سياسة', diplomacy:'دبلوماسية',
  economy:'اقتصاد', military:'عسكري', energy:'طاقة',
  kurdistan:'كردستان', other:'أخرى'
};

const SIG_AR = { critical:'حرجة', high:'عالية', medium:'متوسطة', low:'منخفضة' };

/* ═══════════════════════════════
   STATE
═══════════════════════════════ */
let articles     = [];
let activeFilter = 'all';
let activeSource = '';
let searchTerm   = '';
let page         = 0;
let loading      = false;
let lastFetch    = new Date();
let searchTimer  = null;

/* ═══════════════════════════════
   SUPABASE
═══════════════════════════════ */
async function sbFetch(table, params='') {
  if (!SB_URL || !SB_KEY) return { data: demoData(), count: demoData().length };
  try {
    const r = await fetch(`${SB_URL}/rest/v1/${table}${params}`, {
      headers: {
        'apikey': SB_KEY,
        'Authorization': `Bearer ${SB_KEY}`,
        'Prefer': 'count=exact',
      }
    });
    const count = parseInt(r.headers.get('Content-Range')?.split('/')[1] || '0');
    const data  = await r.json();
    return { data: Array.isArray(data) ? data : [], count };
  } catch { return { data: [], count: 0 }; }
}

/* ═══════════════════════════════
   LOAD ARTICLES
═══════════════════════════════ */
async function loadArticles(append=false) {
  if (loading) return;
  loading = true;

  if (!append) {
    page = 0;
    document.getElementById('feed-items').innerHTML =
      `<div class="loading"><div class="loading-spinner"></div>جاري جلب الأخبار...</div>`;
  }

  let params = `?select=id,title_ar,title_original,body_ar,body_original,original_url,category,importance_score,published_at,iraq_keywords,sources(name,region,type),analyses(summary_ar,actors,significance,stance)`;
  params += `&mentions_iraq=eq.true&order=published_at.desc&limit=20&offset=${page*20}`;

  // Filters
  if (activeFilter === 'critical') params += `&importance_score=gte.75`;
  else if (['security','politics','diplomacy','economy','military','energy','kurdistan'].includes(activeFilter))
    params += `&category=eq.${activeFilter}`;
  else if (activeFilter === '24h') params += `&published_at=gte.${new Date(Date.now()-86400000).toISOString()}`;
  else if (activeFilter === '48h') params += `&published_at=gte.${new Date(Date.now()-172800000).toISOString()}`;
  else if (activeFilter === 'week') params += `&published_at=gte.${new Date(Date.now()-604800000).toISOString()}`;

  if (activeSource) params += `&source_id=eq.${activeSource}`;
  if (searchTerm)   params += `&title_ar=ilike.*${encodeURIComponent(searchTerm)}*`;

  const res = await sbFetch('articles', params);
  const newArticles = res.data.map(a => ({
    ...a,
    source_name:  a.sources?.name || '',
    source_region:a.sources?.region || 'international',
    summary_ar:   Array.isArray(a.analyses) ? a.analyses[0]?.summary_ar : '',
    actors:       Array.isArray(a.analyses) ? a.analyses[0]?.actors : '',
    significance: Array.isArray(a.analyses) ? a.analyses[0]?.significance : 'medium',
    stance:       Array.isArray(a.analyses) ? a.analyses[0]?.stance : 'neutral',
  }));

  if (!append) articles = newArticles;
  else         articles = [...articles, ...newArticles];

  document.getElementById('feed-count').textContent =
    `${res.count.toLocaleString('ar')} خبر`;

  renderFeed(append);
  loading = false;
  lastFetch = new Date();
}

/* ═══════════════════════════════
   RENDER FEED
═══════════════════════════════ */
function renderFeed(append=false) {
  const container = document.getElementById('feed-items');

  if (!articles.length) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">لا توجد أخبار مطابقة</div></div>`;
    return;
  }

  const html = articles.map((a,i) => buildCard(a,i)).join('');

  if (!append) {
    container.innerHTML = html;
    // Infinite scroll sentinel
    container.insertAdjacentHTML('beforeend','<div id="scroll-sentinel" style="height:1px"></div>');
    setupInfiniteScroll();
  } else {
    document.getElementById('scroll-sentinel')?.remove();
    container.insertAdjacentHTML('beforeend', html);
    container.insertAdjacentHTML('beforeend','<div id="scroll-sentinel" style="height:1px"></div>');
  }
}

function buildCard(a, i) {
  const color   = SOURCE_COLORS[a.source_region] || '#2563eb';
  const init    = a.source_name.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase().slice(0,2);
  const timeAgo = formatTime(a.published_at);
  const sig     = a.significance || 'medium';
  const cat     = a.category     || 'other';
  const title   = a.title_ar || a.title_original || '—';
  const hasTranslation = a.body_ar && a.body_ar.length > 20;
  const hasOriginal    = a.body_original && a.body_original.length > 20;
  const hasAnalysis    = a.summary_ar && a.summary_ar.length > 10;
  const keywords       = (a.iraq_keywords||[]).slice(0,3);

  return `
<div class="card" style="animation-delay:${i*0.04}s">
  <div class="card-meta">
    <div class="card-source">
      <div class="src-avatar" style="background:${color}22;color:${color}">${init}</div>
      ${a.source_name}
    </div>
    <span class="card-time">${timeAgo}</span>
    <span class="sig-badge sig-${sig}">${sig==='critical'?'🔴':sig==='high'?'🟠':sig==='medium'?'🟡':'⚪'} ${SIG_AR[sig]||'—'}</span>
    <span class="card-cat cat-${cat}">${CAT_AR[cat]||'أخرى'}</span>
  </div>

  <div class="card-title">${title}</div>

  ${hasOriginal||hasTranslation||hasAnalysis ? `
  <div class="content-tabs">
    <div class="ctabs">
      ${hasTranslation ? `<div class="ctab on" onclick="switchTab(this,'tr-${i}')">الترجمة</div>` : ''}
      ${hasOriginal    ? `<div class="ctab ${!hasTranslation?'on':''}" onclick="switchTab(this,'or-${i}')">النص الأصلي</div>` : ''}
      ${hasAnalysis    ? `<div class="ctab" onclick="switchTab(this,'an-${i}')">التحليل</div>` : ''}
    </div>
    ${hasTranslation ? `
    <div class="ctab-content on" id="tr-${i}">
      <div class="translation-text">${a.body_ar.slice(0,400)}${a.body_ar.length>400?'...':''}</div>
    </div>` : ''}
    ${hasOriginal ? `
    <div class="ctab-content ${!hasTranslation?'on':''}" id="or-${i}">
      <div class="original-text">${a.body_original.slice(0,400)}${a.body_original.length>400?'...':''}</div>
    </div>` : ''}
    ${hasAnalysis ? `
    <div class="ctab-content" id="an-${i}">
      <div class="analysis-box">
        <div class="analysis-label">✦ تحليل</div>
        <div class="analysis-text">${a.summary_ar}</div>
        ${a.actors ? `<div class="actors-row">الأطراف: ${a.actors.split(/[،,]/).slice(0,4).map(s=>`<span class="actor-tag">${s.trim()}</span>`).join('')}</div>` : ''}
      </div>
    </div>` : ''}
  </div>` : ''}

  <div class="card-footer">
    ${a.original_url ? `<a href="${a.original_url}" target="_blank" class="card-link">↗ المصدر الأصلي</a>` : ''}
    <div class="kw-tags">
      ${keywords.map(k=>`<span class="kw-tag">${k}</span>`).join('')}
    </div>
  </div>
</div>`;
}

function switchTab(el, targetId) {
  const card = el.closest('.content-tabs');
  card.querySelectorAll('.ctab').forEach(t=>t.classList.remove('on'));
  card.querySelectorAll('.ctab-content').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  document.getElementById(targetId)?.classList.add('on');
}

/* ═══════════════════════════════
   SOURCES SIDEBAR
═══════════════════════════════ */
async function loadSources() {
  const res = await sbFetch('sources', '?select=id,name,region,type&is_active=eq.true&order=trust_score.desc');
  const list = document.getElementById('sources-list');

  if (!res.data.length) {
    list.innerHTML = '<div style="color:var(--t3);font-size:12px">لا توجد مصادر</div>';
    return;
  }

  list.innerHTML = `
    <div class="src-item ${activeSource===''?'active':''}" onclick="filterSource('')">
      <div class="src-dot" style="background:var(--accent)"></div>
      <div class="src-name">كل المصادر</div>
    </div>
  ` + res.data.map(s => `
    <div class="src-item ${activeSource===s.id?'active':''}" onclick="filterSource('${s.id}')">
      <div class="src-dot" style="background:${SOURCE_COLORS[s.region]||'#666'}"></div>
      <div class="src-name">${s.name}</div>
    </div>
  `).join('');
}

function filterSource(id) {
  activeSource = id;
  loadSources();
  loadArticles();
}

/* ═══════════════════════════════
   CRITICAL + TRENDING
═══════════════════════════════ */
async function loadCritical() {
  const since = new Date(Date.now()-72*3600000).toISOString();
  const res = await sbFetch('articles',
    `?select=title_ar,title_original,published_at,sources(name)&mentions_iraq=eq.true&importance_score=gte.75&published_at=gte.${since}&order=importance_score.desc&limit=5`);

  const el = document.getElementById('critical-list');
  if (!res.data.length) { el.innerHTML = '<div style="color:var(--t3);font-size:12px;padding:8px 0">لا أحداث حرجة حالياً ✓</div>'; return; }

  el.innerHTML = res.data.map(a => `
    <div class="critical-item">
      <div class="critical-title">${a.title_ar||a.title_original||'—'}</div>
      <div class="critical-meta">${a.sources?.name||''} • ${formatTime(a.published_at)}</div>
    </div>
  `).join('');
}

async function loadTrending() {
  // جلب الكلمات المفتاحية الأكثر ظهوراً
  const res = await sbFetch('articles',
    `?select=iraq_keywords&mentions_iraq=eq.true&published_at=gte.${new Date(Date.now()-86400000).toISOString()}&limit=100`);

  const freq = {};
  res.data.forEach(a => {
    (a.iraq_keywords||[]).forEach(kw => {
      freq[kw] = (freq[kw]||0) + 1;
    });
  });

  const sorted = Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const el = document.getElementById('trending-list');

  if (!sorted.length) { el.innerHTML = '<div style="color:var(--t3);font-size:12px">لا توجد بيانات كافية</div>'; return; }

  el.innerHTML = sorted.map(([word,count],i) => `
    <div class="trending-item" onclick="document.getElementById('search').value='${word}';searchTerm='${word}';loadArticles()">
      <div class="trend-num">${i+1}</div>
      <div style="flex:1">
        <div class="trend-word">${word}</div>
        <div class="trend-count">${count} خبر</div>
      </div>
    </div>
  `).join('');
}

/* ═══════════════════════════════
   FILTERS
═══════════════════════════════ */
function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.f-chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  loadArticles();
}

/* ═══════════════════════════════
   SEARCH
═══════════════════════════════ */
function debounce() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchTerm = document.getElementById('search').value.trim();
    loadArticles();
  }, 400);
}

/* ═══════════════════════════════
   INFINITE SCROLL
═══════════════════════════════ */
function setupInfiniteScroll() {
  const sentinel = document.getElementById('scroll-sentinel');
  if (!sentinel) return;
  const observer = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting && !loading) {
      page++;
      loadArticles(true);
    }
  }, { rootMargin: '200px' });
  observer.observe(sentinel);
}

/* ═══════════════════════════════
   AUTO REFRESH
═══════════════════════════════ */
function refresh() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  Promise.all([loadArticles(), loadCritical(), loadTrending()])
    .finally(() => btn.classList.remove('spinning'));
}

// Auto-check for new items every 60 seconds
setInterval(async () => {
  if (!SB_URL || !SB_KEY) return;
  const since = lastFetch.toISOString();
  const res = await sbFetch('articles',
    `?select=id&mentions_iraq=eq.true&fetched_at=gte.${since}&limit=1`);
  if (res.count > 0) {
    const badge = document.getElementById('new-badge');
    badge.style.display = 'block';
    badge.textContent = `↑ ${res.count} خبر جديد — اضغط للتحديث`;
  }
}, 60000);

function loadNewItems() {
  document.getElementById('new-badge').style.display = 'none';
  refresh();
}

/* ═══════════════════════════════
   HELPERS
═══════════════════════════════ */
function formatTime(iso) {
  if (!iso) return '—';
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff/60000);
  const h = Math.floor(diff/3600000);
  const d = Math.floor(diff/86400000);
  if (m < 1)  return 'الآن';
  if (m < 60) return `منذ ${m} د`;
  if (h < 24) return `منذ ${h} س`;
  return `منذ ${d} يوم`;
}

function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('ar-IQ',{hour12:false,timeZone:'Asia/Baghdad'}) + ' بغداد';
}

/* ═══════════════════════════════
   CONFIG
═══════════════════════════════ */
function openConfig() {
  const url = prompt('SUPABASE_URL:', SB_URL);
  if (url === null) return;
  const key = prompt('SUPABASE_ANON_KEY:', SB_KEY);
  if (key === null) return;
  SB_URL = url.trim(); SB_KEY = key.trim();
  localStorage.setItem('sb_url', SB_URL);
  localStorage.setItem('sb_key', SB_KEY);
  location.reload();
}

/* ═══════════════════════════════
   INIT
═══════════════════════════════ */
window.addEventListener('DOMContentLoaded', () => {
  updateClock();
  setInterval(updateClock, 1000);
  loadArticles();
  loadSources();
  loadCritical();
  loadTrending();
});
</script>
